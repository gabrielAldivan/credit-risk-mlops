name: CI — Credit Risk MLOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: python data/download.py

      - name: Run preprocessing
        run: python src/preprocess.py

      - name: Run unit tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=70

      - name: Train models (offline — file-based MLflow)
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns"
        run: python src/train.py

      - name: Run evaluation + SHAP
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns"
        run: python src/evaluate.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install flake8 black
      - name: Black format check
        run: black --check src/
      - name: Flake8
        run: flake8 src/ --max-line-length=100 --ignore=E203,W503,E731
